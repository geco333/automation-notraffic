# Local development: run frontend with Vite (hot reload), no backend required (mock data)
version: "3.8"

services:
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
